server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ledgerflow}
    username: ${DB_USERNAME:ledgerflow_user}
    password: ${DB_PASSWORD:ledgerflow_pass}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
  flyway:
    enabled: true
    locations: classpath:db/migration

azure:
  eventhub:
    connection-string: ${EVENTHUB_CONNECTION_STRING:}
    name: ${EVENTHUB_NAME:transactions}
    consumer-group: ${EVENTHUB_CONSUMER_GROUP:$Default}

ledgerflow:
  consumer:
    enabled: ${CONSUMER_ENABLED:true}
  eventhub:
    local-fallback-enabled: ${EVENTHUB_LOCAL_FALLBACK_ENABLED:false}
