version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerflow
      POSTGRES_USER: ledgerflow_user
      POSTGRES_PASSWORD: ledgerflow_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  ledgerflow:
    build: .
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ledgerflow
      DB_USERNAME: ledgerflow_user
      DB_PASSWORD: ledgerflow_pass
      EVENTHUB_CONNECTION_STRING: ${EVENTHUB_CONNECTION_STRING}
      EVENTHUB_NAME: ${EVENTHUB_NAME:-transactions}

volumes:
  pg_data:
